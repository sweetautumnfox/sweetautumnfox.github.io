  <script type="text/babel">
/* Notes — interactive reverse-chronological feed + individual post pages.
   Feed: tag filtering, free-text search, like (persisted), compose a draft.
   Post page: full long-form content, back link, prev/next navigation. */
const { useState: useStateN, useMemo, useEffect: useEffectN } = React;

const NOW = new Date("2026-06-09T12:00:00");

function relTime(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  const days = Math.round((NOW - d) / 86400000);
  if (days <= 0) return "today";
  if (days === 1) return "yesterday";
  if (days < 7) return days + " days ago";
  if (days < 30) return Math.round(days / 7) + "w ago";
  if (days < 365) return Math.round(days / 30) + "mo ago";
  return Math.round(days / 365) + "y ago";
}
function absDate(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

const LIKE_KEY = "jl_note_likes_v1";
const OPEN_KEY = "jl_note_open_v1";

function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
}

/* a single card in the feed */
function NoteCard({ note, onOpen, onToggleTag, activeTags, liked, onLike }) {
  return (
    <article className="note">
      <div className="ntime">
        {relTime(note.date)}
        <span className="abs">{absDate(note.date)}</span>
      </div>
      <div className="nbody">
        <h3 className="ntitle" onClick={() => onOpen(note.id)}>
          <Html as="span" html={note.title} />
        </h3>
        <div className="ntext">
          <Html as="p" html={note.summary} />
        </div>
        <button className="readmore" onClick={() => onOpen(note.id)}>
          Read full note <span className="ar">→</span>
        </button>
        <div className="nfoot">
          <div className="ntags">
            {note.tags.map((t) => (
              <button
                key={t}
                className="ntag"
                onClick={() => onToggleTag(t)}
                style={activeTags.includes(t) ? { color: "var(--accent)" } : null}
              >#{t}</button>
            ))}
          </div>
          <div className="nactions">
            <span className="readmins">{note.readMins} min</span>
            <button className="icon-btn" data-on={liked} onClick={() => onLike(note.id)}>
              <span className="heart">{liked ? "♥" : "♡"}</span> {liked ? "liked" : "like"}
            </button>
          </div>
        </div>
      </div>
    </article>
  );
}

/* full post page */
function NoteDetail({ note, prev, next, onClose, onOpen, onTag, liked, onLike }) {
  useEffectN(() => { window.scrollTo({ top: 0 }); }, [note.id]);
  return (
    <article className="note-detail page">
      <button className="note-back" onClick={onClose}>
        <span className="ar">←</span> All notes
      </button>

      <header className="nd-head">
        <p className="eyebrow">
          {note.draft ? <span className="accent">Draft · </span> : null}
          {absDate(note.date)} · {relTime(note.date)} · {note.readMins} min read
        </p>
        <Html as="h1" className="nd-title" html={note.title} />
        <div className="nd-tags">
          {note.tags.map((t) => (
            <button key={t} className="chip" onClick={() => onTag(t)}>#{t}</button>
          ))}
        </div>
      </header>

      <div className="nd-body">
        {(note.full || [note.summary]).map((para, i) => (
          <Html as="p" key={i} html={para} />
        ))}
      </div>

      <div className="nd-actions">
        <button className="icon-btn" data-on={liked} onClick={() => onLike(note.id)}>
          <span className="heart">{liked ? "♥" : "♡"}</span> {liked ? "liked" : "like this note"}
        </button>
        <button className="arrow-link" onClick={onClose}>Back to the feed</button>
      </div>

      <nav className="nd-nav">
        <div className="nd-navcell">
          {next ? (
            <button className="nd-navbtn" onClick={() => onOpen(next.id)}>
              <span className="nd-dir">← Older</span>
              <Html as="span" className="nd-navtitle" html={next.title} />
            </button>
          ) : <span className="nd-end">— oldest note —</span>}
        </div>
        <div className="nd-navcell end">
          {prev ? (
            <button className="nd-navbtn right" onClick={() => onOpen(prev.id)}>
              <span className="nd-dir">Newer →</span>
              <Html as="span" className="nd-navtitle" html={prev.title} />
            </button>
          ) : <span className="nd-end">— latest note —</span>}
        </div>
      </nav>
    </article>
  );
}

function NotesPage() {
  const baseNotes = window.SITE.notes;
  const [activeTags, setActiveTags] = useStateN([]);
  const [openId, setOpenId] = useStateN(() => localStorage.getItem(OPEN_KEY) || null);
  const [likes, setLikes] = useStateN(() => {
    const stored = loadJSON(LIKE_KEY, null);
    if (stored) return stored;
    const seed = {};
    baseNotes.forEach((n) => { if (n.liked) seed[n.id] = true; });
    return seed;
  });

  useEffectN(() => { localStorage.setItem(LIKE_KEY, JSON.stringify(likes)); }, [likes]);
  useEffectN(() => {
    if (openId) localStorage.setItem(OPEN_KEY, openId);
    else localStorage.removeItem(OPEN_KEY);
  }, [openId]);

  const allNotes = useMemo(() => {
    return [...baseNotes].sort((a, b) => (a.date < b.date ? 1 : -1));
  }, [baseNotes]);

  const allTags = useMemo(() => {
    const counts = {};
    allNotes.forEach((n) => n.tags.forEach((t) => { counts[t] = (counts[t] || 0) + 1; }));
    return Object.entries(counts).sort((a, b) => b[1] - a[1]);
  }, [allNotes]);

  const toggleTag = (t) =>
    setActiveTags((cur) => (cur.includes(t) ? cur.filter((x) => x !== t) : [...cur, t]));

  const onLike = (id) => setLikes((cur) => ({ ...cur, [id]: !cur[id] }));

  const openNote = (id) => setOpenId(id);
  const closeNote = () => { setOpenId(null); window.scrollTo({ top: 0 }); };
  const tagFromDetail = (t) => { setOpenId(null); setActiveTags([t]); window.scrollTo({ top: 0 }); };

  const filtered = useMemo(() => {
    return allNotes.filter((n) =>
      activeTags.length === 0 || activeTags.every((t) => n.tags.includes(t))
    );
  }, [allNotes, activeTags]);

  /* ---- post page ---- */
  const openIndex = allNotes.findIndex((n) => n.id === openId);
  if (openId && openIndex !== -1) {
    const note = allNotes[openIndex];
    return (
      <div className="wrap section" style={{ paddingTop: "clamp(32px,6vw,64px)" }}>
        <NoteDetail
          note={note}
          prev={allNotes[openIndex - 1] || null}
          next={allNotes[openIndex + 1] || null}
          onClose={closeNote}
          onOpen={openNote}
          onTag={tagFromDetail}
          liked={!!likes[note.id]}
          onLike={onLike}
        />
      </div>
    );
  }

  /* ---- feed ---- */
  return (
    <div className="page wrap section" style={{ paddingTop: "clamp(40px,7vw,80px)" }}>
      <p className="eyebrow"><span className="mark">●</span> 03 / Notes</p>
      <h1 style={{ fontSize: "var(--fs-h1)", marginTop: 16 }}>
        A notebook of <span className="serif-italic accent">unfinished</span> ideas
      </h1>
      <span className="title-stripe" aria-hidden="true"></span>
      <p className="lead notes-intro" style={{ marginTop: 18 }}>
        Short posts, newest first. Half-formed thoughts on active inference, theory, and things I'm reading.
        Click any note to read the full version.
      </p>

      {allTags.length > 0 && (
        <div className="notes-controls">
          <div className="tagfilter">
            {allTags.map(([t, c]) => (
              <button
                key={t}
                className="chip"
                data-on={activeTags.includes(t)}
                onClick={() => toggleTag(t)}
              >
                #{t} <span className="c">{c}</span>
              </button>
            ))}
            {activeTags.length > 0 && (
              <button className="chip" onClick={() => setActiveTags([])}>clear ×</button>
            )}
          </div>
        </div>
      )}

      {allNotes.length > 0 && (
        <div className="feed-meta">
          {filtered.length} {filtered.length === 1 ? "note" : "notes"}
          {activeTags.length > 0 && " · " + activeTags.map((t) => "#" + t).join(" + ")}
        </div>
      )}

      <div className="feed">
        {filtered.length === 0 ? (
          <div className="empty">{activeTags.length ? "No notes match that. Try clearing a filter." : "No notes yet — check back soon."}</div>
        ) : (
          filtered.map((n) => (
            <NoteCard
              key={n.id}
              note={n}
              onOpen={openNote}
              onToggleTag={toggleTag}
              activeTags={activeTags}
              liked={!!likes[n.id]}
              onLike={onLike}
            />
          ))
        )}
      </div>
    </div>
  );
}

Object.assign(window, { NotesPage });
  </script>

  <!-- ---------- app ---------- -->
  <script type="text/babel">
/* App: routing, persistence. */
const { useState: useStateA, useEffect: useEffectA } = React;

const ROUTE_KEY = "jl_route_v1";

function App() {
  const [route, setRouteRaw] = useStateA(() => {
    const h = (location.hash || "").replace("#", "");
    if (ROUTES.some((r) => r.id === h)) return h;
    return localStorage.getItem(ROUTE_KEY) || "home";
  });

  const setRoute = (id) => {
    setRouteRaw(id);
    localStorage.setItem(ROUTE_KEY, id);
    if (history.replaceState) history.replaceState(null, "", "#" + id);
    else location.hash = id;
    window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
  };

  useEffectA(() => {
    const onHash = () => {
      const h = (location.hash || "").replace("#", "");
      if (ROUTES.some((r) => r.id === h)) setRouteRaw(h);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  // intercept in-content links that carry data-route
  useEffectA(() => {
    const handler = (e) => {
      const a = e.target.closest("[data-route]");
      if (a) { e.preventDefault(); setRoute(a.getAttribute("data-route")); }
    };
    document.addEventListener("click", handler);
    return () => document.removeEventListener("click", handler);
  }, []);

  let Page;
  switch (route) {
    case "research": Page = <ResearchPage setRoute={setRoute} />; break;
    case "notes": Page = <NotesPage />; break;
    case "news": Page = <NewsPage />; break;
    case "cv": Page = <CVPage />; break;
    case "contact": Page = <ContactPage />; break;
    default: Page = <AboutPage setRoute={setRoute} />;
  }

  return (
    <React.Fragment>
      <Header route={route} setRoute={setRoute} />
      <main key={route}>{Page}</main>
      <Footer setRoute={setRoute} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
